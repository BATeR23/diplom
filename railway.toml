[build]
  [build.php]
    version = "8.4"

[deploy]
  startCommand = "php artisan serve --host=0.0.0.0 --port=$PORT"

[build.buildpacks]
  disable = ["railpack/php-composer"]

[build.command]
  preinstall = "curl -sS https://getcomposer.org/installer | php && mv composer.phar /usr/local/bin/composer && chmod +x /usr/local/bin/composer"
  build = "composer install --no-dev --optimize-autoloader && npm install && npm run build && php artisan optimize"